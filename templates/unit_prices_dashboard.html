<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단가명세표 - Civil Cost Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .project-header h2 { font-size: 1.4rem; color: #2c3e50; }
        .back-link { color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        .cost-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 160px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cost-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .cost-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .cost-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .cost-count { font-size: 0.85rem; color: #888; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card-grid { margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>💰 단가명세표</h1>
    </header>
    <div class="container">
        <div class="project-header">
            <h2>🏗️ {{ project.name }}</h2>
            <a href="/" class="back-link">← 메인으로</a>
        </div>

        <p style="text-align:center; color:#666; margin-bottom:1.5rem;">조회할 단가 목록을 선택하세요.</p>

        <div class="card-grid">
            <a href="/unit-prices/{{ project.id }}/composite" class="cost-card">
                <span class="cost-icon">📋</span>
                <span class="cost-title">일위대가 목록표</span>
                <span class="cost-count">({{ counts.composite }}건)</span>
            </a>
            <a href="/unit-prices/{{ project.id }}/standard" class="cost-card">
                <span class="cost-icon">📐</span>
                <span class="cost-title">품셈단가 목록표</span>
                <span class="cost-count">({{ counts.standard }}건)</span>
            </a>
            <a href="/unit-prices/{{ project.id }}/market" class="cost-card">
                <span class="cost-icon">🏪</span>
                <span class="cost-title">표준시장단가 목록표</span>
                <span class="cost-count">({{ counts.market }}건)</span>
            </a>
            <a href="/unit-prices/{{ project.id }}/quote" class="cost-card">
                <span class="cost-icon">📄</span>
                <span class="cost-title">견적단가 목록표</span>
                <span class="cost-count">({{ counts.quote }}건)</span>
            </a>
        </div>
    </div>

    <footer>
        <p>Civil Cost Manager &copy; 2026</p>
    </footer>
</body>
</html>
