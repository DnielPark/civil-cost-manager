<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Civil Cost Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .price-table th, .price-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .price-table th {
            background-color: #4CAF50;
            color: white;
            white-space: nowrap;
        }
        .price-table tr:nth-child(even) { background-color: #f2f2f2; }
        .price-table tr:hover { background-color: #ddd; }
        .text-right { text-align: right !important; }
        .text-left { text-align: left !important; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .page-header h2 { font-size: 1.3rem; color: #2c3e50; }
        .back-link { color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input[type="text"] {
            padding: 0.4rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }
        .toolbar button {
            padding: 0.4rem 1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .toolbar button:hover { background: #2980b9; }
        .toolbar .btn-green { background: #4CAF50; }
        .toolbar .btn-green:hover { background: #45a049; }
        .edit-input {
            width: 100%;
            padding: 4px;
            border: 1px solid #3498db;
            border-radius: 3px;
            font-size: 0.85rem;
            text-align: center;
        }
        .edit-input.text-left { text-align: left !important; }
        .edit-input.text-right { text-align: right !important; }
        .edit-actions {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .edit-actions button {
            padding: 2px 8px;
            font-size: 0.75rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #45a049; }
        .btn-cancel { background: #e74c3c; color: white; }
        .btn-cancel:hover { background: #c0392b; }
        .editing { background-color: #fff3cd !important; }
    </style>
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
    </header>
    <div class="container">
        <div class="page-header">
            <h2>🏗️ {{ project.name }}</h2>
            <a href="/unit-prices/{{ project.id }}" class="back-link">← 단가명세표로</a>
        </div>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="검색 (공종명 또는 규격)" onkeyup="filterTable()">
            <button onclick="filterTable()">🔍 검색</button>
            <button class="btn-green" onclick="alert('엑셀 업로드 기능은 다음 단계에서 구현 예정')">📤 엑셀 업로드</button>
            <button class="btn-green" onclick="alert('엑셀 다운로드 기능은 다음 단계에서 구현 예정')">📥 엑셀 다운로드</button>
        </div>

        <table class="price-table" id="priceTable">
            <thead>
                <tr id="tableHeader">
                    <!-- JS에서 동적 생성 -->
                </tr>
            </thead>
            <tbody id="priceBody">
                <tr><td colspan="10">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>Civil Cost Manager &copy; 2026</p>
    </footer>

    <script>
        const PROJECT_ID = {{ project.id }};
        const COST_TYPE = '{{ cost_type }}';
        let priceData = [];

        // 칼럼 정의 (테이블 유형별)
        const COLUMNS = {
            'final': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'cost_source', label: '출처', render: v => v || '' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'composite': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'composition_detail', label: '구성내역', render: v => v || '', class: 'text-left' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'standard': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'market': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'quote': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'price_info': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '품목명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'publisher', label: '발행처', render: v => v || '' },
                { key: 'issue_date', label: '발행일', render: v => v || '' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
            'field_report': [
                { key: 'idx', label: '색인', render: (v, i) => i + 1 },
                { key: 'work_name', label: '공종명', render: v => v, class: 'text-left' },
                { key: 'spec', label: '규격', render: v => v, class: 'text-left' },
                { key: 'unit', label: '단위', render: v => v },
                { key: 'unit_quantity', label: '단위수량', render: v => v },
                { key: 'material_cost', label: '재료비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'labor_cost', label: '노무비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'expense_cost', label: '경비', render: v => (v || 0).toLocaleString(), class: 'text-right' },
                { key: 'total', label: '합계', render: (v, i, item) => `<strong>${((item.material_cost||0)+(item.labor_cost||0)+(item.expense_cost||0)).toLocaleString()}</strong>`, class: 'text-right' },
                { key: 'note', label: '비고', render: v => v || '', class: 'text-left' },
            ],
        };

        function buildHeader() {
            const cols = COLUMNS[COST_TYPE];
            if (!cols) return '';
            return cols.map(c => `<th>${c.label}</th>`).join('');
        }

        function buildRows(data) {
            const cols = COLUMNS[COST_TYPE];
            if (!cols) return '';
            return data.map((item, idx) => {
                const cells = cols.map(c => {
                    const val = c.key === 'idx' ? idx : item[c.key];
                    const rendered = c.render ? c.render(val, idx, item) : (val ?? '');
                    return `<td class="cell-${c.key}${c.class ? ' ' + c.class : ''}" data-key="${c.key}">${rendered}</td>`;
                }).join('');
                return `<tr data-id="${item.id}" ondblclick="startEdit(this)">${cells}</tr>`;
            }).join('');
        }

        let editingRow = null;
        let originalData = null;

        function startEdit(row) {
            if (editingRow) return; // 이미 편집 중이면 무시
            
            const itemId = row.dataset.id;
            const item = priceData.find(p => String(p.id) === itemId);
            if (!item) return;

            editingRow = row;
            originalData = { ...item };

            const cols = COLUMNS[COST_TYPE];
            const cells = row.querySelectorAll('td');

            cells.forEach((cell, idx) => {
                const col = cols[idx];
                if (!col || col.key === 'idx' || col.key === 'total') return; // 색인, 합계는 편집 불가

                const key = col.key;
                const value = item[key] ?? '';
                const inputClass = col.class ? col.class : '';
                
                cell.innerHTML = `<input type="text" class="edit-input ${inputClass}" value="${value}" data-key="${key}">`;
            });

            // 저장/취소 버튼 추가
            const actionCell = document.createElement('td');
            actionCell.className = 'edit-actions';
            actionCell.innerHTML = `
                <button class="btn-save" onclick="saveEdit(event)">💾</button>
                <button class="btn-cancel" onclick="cancelEdit(event)">✕</button>
            `;
            row.appendChild(actionCell);

            row.classList.add('editing');
        }

        async function saveEdit(event) {
            event.stopPropagation();
            if (!editingRow) return;

            const itemId = editingRow.dataset.id;
            const inputs = editingRow.querySelectorAll('.edit-input');
            const updates = {};

            inputs.forEach(input => {
                const key = input.dataset.key;
                let value = input.value;
                
                // 숫자 필드는 숫자로 변환
                if (['unit_quantity', 'material_cost', 'labor_cost', 'expense_cost', 'source_id'].includes(key)) {
                    value = value === '' ? null : parseFloat(value);
                }
                
                updates[key] = value;
            });

            try {
                const res = await fetch(`/api/unit-prices/${PROJECT_ID}/${COST_TYPE}/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (res.ok) {
                    // 데이터 갱신
                    const itemIndex = priceData.findIndex(p => String(p.id) === itemId);
                    if (itemIndex !== -1) {
                        Object.assign(priceData[itemIndex], updates);
                    }
                    
                    // 행 원상복귀
                    restoreRow(editingRow);
                    editingRow = null;
                    originalData = null;
                } else {
                    const err = await res.json();
                    alert('저장 실패: ' + (err.error || '알 수 없는 오류'));
                }
            } catch (err) {
                alert('저장 실패: ' + err.message);
            }
        }

        function cancelEdit(event) {
            event.stopPropagation();
            if (!editingRow) return;

            restoreRow(editingRow);
            editingRow = null;
            originalData = null;
        }

        function restoreRow(row) {
            const itemId = row.dataset.id;
            const item = priceData.find(p => String(p.id) === itemId);
            if (!item) return;

            const cols = COLUMNS[COST_TYPE];
            const cells = row.querySelectorAll('td');

            cells.forEach((cell, idx) => {
                const col = cols[idx];
                if (!col) return;

                const val = col.key === 'idx' ? Array.from(row.parentNode.children).indexOf(row) : item[col.key];
                const rendered = col.render ? col.render(val, Array.from(row.parentNode.children).indexOf(row), item) : (val ?? '');
                cell.innerHTML = rendered;
            });

            // 액션 셀 제거
            const actionCell = row.querySelector('.edit-actions');
            if (actionCell) actionCell.remove();

            row.classList.remove('editing');
        }

        async function loadData() {
            const tbody = document.getElementById('priceBody');
            const thead = document.getElementById('tableHeader');
            thead.innerHTML = buildHeader();

            try {
                const res = await fetch(`/api/unit-prices/${PROJECT_ID}/${COST_TYPE}`);
                priceData = await res.json();
                tbody.innerHTML = buildRows(priceData) || '<tr><td colspan="20">데이터가 없습니다.</td></tr>';
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="20">로딩 실패</td></tr>';
            }
        }

        function filterTable() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const tbody = document.getElementById('priceBody');

            if (!keyword) {
                tbody.innerHTML = buildRows(priceData);
                return;
            }

            const filtered = priceData.filter(item =>
                item.work_name.toLowerCase().includes(keyword) ||
                item.spec.toLowerCase().includes(keyword)
            );
            tbody.innerHTML = buildRows(filtered) || '<tr><td colspan="20">검색 결과가 없습니다.</td></tr>';
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
