<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단가명세서 - Civil Cost Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .price-table th,
        .price-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .price-table th {
            background-color: #4CAF50;
            color: white;
            white-space: nowrap;
        }
        .price-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .price-table tr:hover {
            background-color: #ddd;
        }
        .price-table .text-right {
            text-align: right !important;
        }
        .price-table .text-left {
            text-align: left !important;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .back-link {
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>💰 단가명세서</h1>
    </header>
    <div class="container">
        <a href="/" class="back-link">← 메인으로</a>

        <table class="price-table" id="priceTable">
            <thead>
                <tr>
                    <th>색인</th>
                    <th>공종명</th>
                    <th>규격</th>
                    <th>단위</th>
                    <th>합계</th>
                    <th>재료비</th>
                    <th>노무비</th>
                    <th>경비</th>
                    <th>비고</th>
                </tr>
            </thead>
            <tbody id="priceBody">
                <tr><td colspan="9">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>Civil Cost Manager &copy; 2026</p>
    </footer>

    <script>
        async function loadUnitPrices() {
            const tbody = document.getElementById('priceBody');
            try {
                const res = await fetch('/api/unit-prices');
                const data = await res.json();

                let html = '';
                data.forEach(item => {
                    html += `<tr>
                        <td>${item.id}</td>
                        <td class="text-left">${item.work_name}</td>
                        <td class="text-left">${item.spec}</td>
                        <td>${item.unit}</td>
                        <td class="text-right">${(item.total_price || 0).toLocaleString()}</td>
                        <td class="text-right">${(item.material_cost || 0).toLocaleString()}</td>
                        <td class="text-right">${(item.labor_cost || 0).toLocaleString()}</td>
                        <td class="text-right">${(item.expense_cost || 0).toLocaleString()}</td>
                        <td class="text-left">${item.note || ''}</td>
                    </tr>`;
                });
                tbody.innerHTML = html || '<tr><td colspan="9">등록된 단가가 없습니다.</td></tr>';
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="9">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadUnitPrices);
    </script>
</body>
</html>
